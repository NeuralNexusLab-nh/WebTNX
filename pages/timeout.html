<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTNX - Connection Timeout</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f8; color: #495057; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); max-width: 480px; width: 100%; text-align: center; border-top: 5px solid #ffc107; box-sizing: border-box; }
        h1 { font-size: 48px; margin: 0 0 10px 0; color: #343a40; }
        h2 { font-size: 20px; margin: 0 0 20px 0; color: #d39e00; font-weight: 600; }
        p { font-size: 15px; line-height: 1.6; color: #6c757d; margin: 0 0 30px 0; text-align: left; }
        .btn { display: inline-block; background-color: #007bff; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: 500; font-size: 14px; transition: background-color 0.2s; border: none; cursor: pointer; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>504</h1>
        <h2>Gateway Timeout</h2>
        <p>
            <strong>WebTNX</strong> has timed out waiting for a response from your local server.<br><br>
            Please check if your local application is running properly and that your browser's tunnel tab has not been closed.
        </p>
        <button onclick="location.reload()" class="btn">Retry Connection</button>
    </div>
</body>
</html>
